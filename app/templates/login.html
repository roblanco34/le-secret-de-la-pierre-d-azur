{% extends "base.html" %}
{% block title %}Connexion | La Pierre d'Azur{% endblock %}

{% block content %}
<div class="container">

    <div class="login-header">
        <span class="gemme"></span>
        <h1>Le Secret de la<br>Pierre d'Azur</h1>
        <p class="sous-titre">Chasse au trésor — Bretagne</p>
    </div>

    <div class="carte carte-azur">
        <div class="form-group">
            <label for="name">Nom de l'équipe</label>
            <input type="text" id="name" name="name" autocomplete="username"
                   placeholder="Nom de ton équipe…" required autofocus>
        </div>
        <div class="form-group">
            <label for="password">Mot de passe</label>
            <input type="password" id="password" name="password" autocomplete="current-password"
                   placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-azur"
                onclick="submitLogin(event)">Entrer dans la quête</button>
    </div>

    <p class="text-center text-muted mt-2" style="font-style: italic; font-size: 0.85rem;">
        « La pierre ne révèle ses secrets<br>qu'à ceux qui savent chercher. »
    </p>

</div>

<form id="login-form" method="POST" action="{{ url_for('auth.login') }}" style="display:none;">
    <input type="hidden" id="f-name" name="name">
    <input type="hidden" id="f-password" name="password">
</form>

<script>
function submitLogin(e) {
    e.preventDefault();
    document.getElementById('f-name').value = document.getElementById('name').value;
    document.getElementById('f-password').value = document.getElementById('password').value;
    document.getElementById('login-form').submit();
}
</script>
{% endblock %}
